services:
  # =====================================================
  # � PostgreSQL - Merkezi Veritabanı
  # =====================================================
  postgres:
    image: postgres:16-alpine
    container_name: bist-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bist_admin
      POSTGRES_PASSWORD: bist_secure_2026
      POSTGRES_DB: bist_trading
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    restart: unless-stopped
    networks:
      - bist-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bist_admin -d bist_trading"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =====================================================
  # 🐍 Python ML Backend - FastAPI + RandomForest
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bist-ml-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://bist_admin:bist_secure_2026@postgres:5432/bist_trading
      - DATABASE_URL_SYNC=postgresql+psycopg2://bist_admin:bist_secure_2026@postgres:5432/bist_trading
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bist-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # =====================================================
  # 🐘 Filament Admin Panel - Laravel + PHP
  # =====================================================
  filament:
    build:
      context: ./filament/demo-main
      dockerfile: Dockerfile
    container_name: bist-filament-admin
    ports:
      - "8001:8001"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8001
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=bist_trading
      - DB_USERNAME=bist_admin
      - DB_PASSWORD=bist_secure_2026
      - BIST_AI_URL=http://backend:8000
      - BIST_AI_TIMEOUT=60
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bist-network

  # =====================================================
  # ⚛️ React Frontend
  # =====================================================
  frontend:
    image: node:18-alpine
    container_name: bist-react-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_ADMIN_URL=http://localhost:8001
      - REACT_APP_WS_URL=ws://localhost:8000
      - HOST=0.0.0.0
      - WATCHPACK_POLLING=true
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bist-network

volumes:
  postgres_data:
    driver: local

networks:
  bist-network:
    driver: bridge
    name: bist-ai-network
